<!DOCTYPE html>
< lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de notas</title>
</head>
<body>

    <h2>Cadastro de Alunos</h2>

    
    <div>
        <label>Nome do Aluno:</label>
        <input type="text" id="nomealuno">

    </div>
    
    <div>
        <label>Nota 1:</label>
        <input type="number" id="nota1">
    </div>

    <div>
        <label>Nota 2:</label>
        <input type="number" id="nota2">
    </div>

    <button onclick="cadastraraluno()">Cadastrar Aluno</button>

    <hr>
    <h3>Último Aluno Cadastrado:</h3>
    <p id="resultadoaluno">Nenhum aluno cadastrado ainda.</p>

    <hr>
    <h3>Histórico da Turma:</h3>
    <div id="listaAlunos">Nenhum histórico disponível.</div>

    <hr>
    <p id="mediaGeral">Média geral da turma: 0.0</p>

    <script src="main.js"></script>
</body>
<html>
